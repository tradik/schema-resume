<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NG0TH0GXV1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-NG0TH0GXV1');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Resume Editor - JSON Resume Schema</title>
    <meta name="description" content="Visual resume editor based on JSON Resume Schema with XSLT template rendering">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        // Dynamically set base href based on current path
        (function() {
            var path = window.location.pathname;
            var basePath = '/';
            if (path.startsWith('/resume-editor')) basePath = '/resume-editor/';
            else if (path.startsWith('/editor')) basePath = '/editor/';
            else if (path.startsWith('/resume-editor')) basePath = '/resume-editor/';
            var base = document.createElement('base');
            base.href = basePath;
            document.head.appendChild(base);
        })();
    </script>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">
                    <a href="../" style="color: inherit; text-decoration: none; display: flex; align-items: center; gap: 8px;">
                        <svg class="app-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        Resume Editor
                    </a>
                </h1>
                <div class="header-actions">
                    <!-- LinkedIn Import - Hidden for now (requires LinkedIn API verification)
                    <button id="importLinkedInBtn" class="btn btn-linkedin" title="Import from LinkedIn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                        </svg>
                        Import from LinkedIn
                    </button>
                    -->
                    <button id="importBtn" class="btn btn-secondary" title="Import JSON">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Import
                    </button>
                    <button id="exportBtn" class="btn btn-secondary" title="Export JSON">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        Export
                    </button>
                    <button id="printBtn" class="btn btn-primary" title="Print Resume">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 6 2 18 2 18 9"></polyline>
                            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                            <rect x="6" y="14" width="12" height="8"></rect>
                        </svg>
                        Print
                    </button>
                    <button id="timelineBtn" class="btn btn-secondary" title="View Career Timeline">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        Timeline
                    </button>
                    <button id="toolsChartBtn" class="btn btn-secondary" title="View Tools Experience Chart">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="20" x2="12" y2="10"></line>
                        <line x1="18" y1="20" x2="18" y2="4"></line>
                        <line x1="6" y1="20" x2="6" y2="16"></line>
                    </svg>
                    Tools
                </button>
                <select id="languageSelector" class="btn btn-secondary" title="Select Language">
                    <option value="en-GB">🇬🇧 English (UK)</option>
                    <option value="en-US">🇺🇸 English (US)</option>
                    <option value="de-DE">🇩🇪 Deutsch</option>
                    <option value="pl-PL">🇵🇱 Polski</option>
                    <option value="fr-FR">🇫🇷 Français</option>
                    <option value="es-ES">🇪🇸 Español</option>
                    <option value="hi-IN">🇮🇳 हिन्दी</option>
                    <option value="ja-JP">🇯🇵 日本語</option>
                </select>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Side Panel -->
            <aside class="side-panel" id="sidePanel">
                <div class="resize-handle" id="resizeHandle"></div>
                <div class="panel-header">
                    <h2 class="panel-title">Resume Data</h2>
                    <button id="togglePanel" class="btn-icon" title="Toggle Panel">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                </div>
                <div class="panel-content">
                    <div class="section-tabs">
                        <button class="tab-btn active" data-section="basics">Basics</button>
                        <button class="tab-btn" data-section="work">Work</button>
                        <button class="tab-btn" data-section="volunteer">Volunteer</button>
                        <button class="tab-btn" data-section="education">Education</button>
                        <button class="tab-btn" data-section="awards">Awards</button>
                        <button class="tab-btn" data-section="certificates">Certificates</button>
                        <button class="tab-btn" data-section="publications">Publications</button>
                        <button class="tab-btn" data-section="skills">Skills</button>
                        <button class="tab-btn" data-section="tools">Tools</button>
                        <button class="tab-btn" data-section="languages">Languages</button>
                        <button class="tab-btn" data-section="interests">Interests</button>
                        <button class="tab-btn" data-section="references">References</button>
                        <button class="tab-btn" data-section="projects">Projects</button>
                    </div>
                    <div id="editorContainer" class="editor-container"></div>
                </div>
            </aside>

            <!-- Preview Area -->
            <main class="preview-area">
                <button id="showPanelBtn" class="btn-show-panel" title="Show Sidebar" style="display: none;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
                <div class="preview-toolbar">
                    <div class="zoom-controls">
                        <button id="zoomOut" class="btn-icon" title="Zoom Out">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="8" y1="11" x2="14" y2="11"></line>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </button>
                        <span id="zoomLevel" class="zoom-level">100%</span>
                        <button id="zoomIn" class="btn-icon" title="Zoom In">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="11" y1="8" x2="11" y2="14"></line>
                                <line x1="8" y1="11" x2="14" y2="11"></line>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </button>
                    </div>
                    <select id="templateSelector" class="btn btn-sm" title="Select Template">
                        <option value="resume.xslt">Classic Template</option>
                        <option value="resume-professional.xslt" selected>Professional Template</option>
                    </select>
                    <button id="editJsonBtn" class="btn btn-sm" title="Edit Raw JSON">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                        Edit JSON
                    </button>
                    <button id="resetZoom" class="btn btn-sm" title="Reset Zoom">Reset</button>
                    <button id="debugModeBtn" class="btn btn-sm" title="Toggle Debug Mode">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="9" y1="9" x2="15" y2="15"></line>
                            <line x1="15" y1="9" x2="9" y2="15"></line>
                        </svg>
                        Debug
                    </button>
                </div>
                <div class="preview-container" id="previewContainer">
                    <div class="a4-page" id="resumePreview">
                        <div class="loading">Loading preview...</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept=".json" style="display: none;">

    <!-- JSON Editor Modal -->
    <div id="jsonEditorModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Raw JSON</h2>
                <button id="closeJsonEditor" class="btn-icon" title="Close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <textarea id="jsonEditorTextarea" spellcheck="false"></textarea>
                <div id="jsonEditorError" class="error-message" style="display: none;"></div>
            </div>
            <div class="modal-footer">
                <button id="formatJsonBtn" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="16 18 22 12 16 6"></polyline>
                        <polyline points="8 6 2 12 8 18"></polyline>
                    </svg>
                    Format JSON
                </button>
                <button id="applyJsonBtn" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    Apply Changes
                </button>
            </div>
        </div>
    </div>

    <!-- Tools Chart Modal -->
    <div id="toolsChartModal" class="modal" style="display: none;">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>Tools & Technologies Experience</h2>
                <button id="closeToolsChartModal" class="btn-icon" title="Close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="toolsChartContainer" class="chart-container">
                    <canvas id="toolsChartCanvas"></canvas>
                </div>
            </div>
            <div class="modal-footer">
                <button id="downloadToolsChartBtn" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download PNG
                </button>
            </div>
        </div>
    </div>

    <!-- Timeline Modal -->
    <div id="timelineModal" class="modal" style="display: none;">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>Career Timeline</h2>
                <button id="closeTimelineModal" class="btn-icon" title="Close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="timelineContainer" class="timeline-container">
                    <div class="loading">Generating timeline...</div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="copyTimelineBtn" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    Copy Mermaid Code
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script type="module">
        // Import Mermaid
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'default',
            gantt: {
                titleTopMargin: 25,
                barHeight: 30,
                barGap: 10,
                topPadding: 50,
                leftPadding: 150,
                gridLineStartPadding: 35,
                fontSize: 13,
                numberSectionStyles: 4,
                useWidth: undefined,
                useMaxWidth: true
            },
            themeVariables: {
                fontSize: '13px'
            }
        });
        window.mermaid = mermaid;
    </script>
    <script>
        console.log('🌐 HTML loaded, inline script executing...');
    </script>
    <script src="src/xslt-wrapper.js"></script>
    <script src="src/i18n.js"></script>
    <script src="src/form-generator.js"></script>
    <script>
        console.log('✅ form-generator.js loaded successfully');
        // Dynamic cache buster
        const script = document.createElement('script');
        script.src = 'src/app.js?v=' + Date.now();
        console.log('📦 Loading app.js with cache buster:', script.src);
        script.onerror = function() {
            console.error('❌ FAILED to load app.js');
        };
        script.onload = function() {
            console.log('✅ app.js loaded successfully');
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
