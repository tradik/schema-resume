# Nginx configuration for Resume Editor
# UTF-8 encoding support

server {
    listen 80;
    server_name localhost;
    
    # Charset
    charset utf-8;
    
    # Increase buffer sizes to handle long URIs with base64 data
    large_client_header_buffers 4 32k;
    client_header_buffer_size 32k;
    
    # Root directory
    root /usr/share/nginx/html;
    index index.html;
    
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # Main location
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Handle /editor without trailing slash - redirect to /editor/
    location = /editor {
        return 301 /editor/;
    }
    
    # Handle /editor path - use ^~ to prevent regex location matching
    location ^~ /editor/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /editor/index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        
        # Cache control headers for HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    
    # Handle /resume-editor without trailing slash
    location = /resume-editor {
        return 301 /resume-editor/;
    }
    
    # Handle /resume-editor path (from cloudflared tunnel)
    location ^~ /resume-editor/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /resume-editor/index.html;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        
        # Cache control headers for HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    
    # JavaScript and CSS - no cache during development
    location ~* \.(js|css)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Access-Control-Allow-Origin "*" always;
    }
    
    # Static assets caching (images, fonts)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*" always;
    }
    
    # XSLT files
    location ~* \.xslt$ {
        add_header Content-Type "application/xml";
        expires 1h;
    }
    
    # JSON files
    location ~* \.json$ {
        add_header Content-Type "application/json";
        expires 1h;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
